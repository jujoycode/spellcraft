version: 1

project:
  name: my-saas
  description: "B2B SaaS 플랫폼"

targets:
  - claude
  - cursor
  - copilot

spells:
  - id: lang
    description: "언어 및 프레임워크"
    globs: ["**/*.ts", "**/*.tsx"]
    content: |
      TypeScript strict 모드를 사용한다.
      any 타입 사용을 금지한다.
      unknown을 사용하고 타입 가드로 좁힌다.

  - id: testing
    description: "테스트 컨벤션"
    targets: [claude, cursor]
    content: |
      vitest를 사용한다.
      테스트 파일은 __tests__/ 디렉토리에 위치한다.
